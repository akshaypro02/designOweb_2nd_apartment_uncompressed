<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | apartment_02</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">apartment_02</div>
    </div>
  </div>

  <!-- 🔥 DEBUG LOG PANEL -->
  <div id="log" style="
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    max-height:40%;
    overflow:auto;
    background:black;
    color:#00ff00;
    font-size:12px;
    z-index:9999;
  "></div>

  <script>
    function log(msg) {
      const el = document.getElementById("log");
      if (el) el.innerHTML += msg + "<br>";
    }

    // JS Errors
    window.onerror = function(msg, url, line, col, error) {
      log("JS ERROR: " + msg + " @ line " + line);
    };

    // Promise Errors
    window.onunhandledrejection = function(e) {
      log("PROMISE ERROR: " + e.reason);
    };

    // Hook console.log
    (function () {
      const oldLog = console.log;
      console.log = function (...args) {
        log(args.join(" "));
        oldLog.apply(console, args);
      };
    })();

    // Crash checkpoint system
    let lastCheckpoint = "";

    function checkpoint(name) {
      lastCheckpoint = name;
      log("CHECKPOINT: " + name);
    }

    // Save last checkpoint before crash/reload
    window.addEventListener("beforeunload", () => {
      localStorage.setItem("lastCheckpoint", lastCheckpoint);
    });

    window.addEventListener("load", () => {
      const last = localStorage.getItem("lastCheckpoint");
      if (last) {
        log("⚠️ LAST SESSION CRASHED AT: " + last);
      }
    });

    // Heartbeat (detect freeze/crash)
    setInterval(() => {
      log("Heartbeat OK");
    }, 3000);
  </script>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function() {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/designOWEB 2.loader.js";

    var config = {
      dataUrl: buildUrl + "/designOWEB 2.data",
      frameworkUrl: buildUrl + "/designOWEB 2.framework.js",
      codeUrl: buildUrl + "/designOWEB 2.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "apartment_02",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
    };

    // Mobile setup
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);

      container.className = "unity-mobile";
      canvas.className = "unity-mobile";

      // 🔥 CRITICAL FIX for iPhone crashes
      config.devicePixelRatio = 1;

    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      checkpoint("Loader JS Loaded");

      createUnityInstance(canvas, config, (progress) => {
        let percent = Math.round(progress * 100);
        progressBarFull.style.width = percent + "%";

        if (percent > 5 && percent < 10) checkpoint("Starting WASM load");
        if (percent > 20 && percent < 30) checkpoint("Data file loading");
        if (percent > 50 && percent < 60) checkpoint("Textures loading");
        if (percent > 80 && percent < 90) checkpoint("Finalizing");

        log("Progress: " + percent + "%");

      }).then((unityInstance) => {
        checkpoint("Unity Fully Loaded ✅");

        loadingBar.style.display = "none";

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };

      }).catch((message) => {
        log("ERROR: " + message);
        log("LAST CHECKPOINT: " + lastCheckpoint);
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
